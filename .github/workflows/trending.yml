name: collect GitHub trending

on:
  schedule: [{ cron: '7 0 * * *' }]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ace-hunter-trending
  cancel-in-progress: false

jobs:
  collect:
    strategy:
      fail-fast: false
      matrix:
        period: [daily, weekly, monthly]
    runs-on: ubuntu-latest
    environment: ace-hunter-production
    timeout-minutes: 20
    env:
      ACE_HUNTER_RUNTIME_DATABASE_URL: ${{ secrets.ACE_HUNTER_RUNTIME_DATABASE_URL }}
      ACE_HUNTER_GITHUB_TOKEN: ${{ secrets.ACE_HUNTER_GITHUB_TOKEN }}
      ACE_HUNTER_USER_ID: ${{ secrets.ACE_HUNTER_USER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Collect ${{ matrix.period }} ranking
        run: >-
          node dist/src/cli/index.js job collect_github_trending --period '${{ matrix.period }}'
          --orchestrator-run-id '${{ github.run_id }}'
          --orchestrator-run-attempt '${{ github.run_attempt }}'
          --orchestrator-workflow 'trending.yml'
