name: execute durable ops command

on:
  workflow_dispatch:
    inputs:
      job_name:
        description: Registered job name
        required: true
        type: string
      command_id:
        description: Durable command queue id
        required: true
        type: string

permissions:
  contents: read

jobs:
  execute:
    runs-on: ubuntu-latest
    environment: ace-hunter-production
    timeout-minutes: 45
    env:
      ACE_HUNTER_RUNTIME_DATABASE_URL: ${{ secrets.ACE_HUNTER_RUNTIME_DATABASE_URL }}
      ACE_HUNTER_GITHUB_TOKEN: ${{ secrets.ACE_HUNTER_GITHUB_TOKEN }}
      ACE_HUNTER_USER_ID: ${{ secrets.ACE_HUNTER_USER_ID }}
      ACE_HUNTER_DEEPSEEK_API_KEY: ${{ secrets.ACE_HUNTER_DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Validate registered GitHub command
        env:
          JOB_NAME: ${{ inputs.job_name }}
        run: >-
          node --input-type=module -e
          'import { JOB_CATALOG } from "./dist/src/ops/job-catalog.js";
          const row=JOB_CATALOG.find(([name,executor])=>name===process.env.JOB_NAME&&executor==="github");
          if(!row) { console.error("job_name is not a registered GitHub job"); process.exit(1); }
          if(!row[3]) { console.error("job has no catalog workflow"); process.exit(1); }'
      - run: >-
          node dist/src/cli/index.js command "$COMMAND_ID"
          --worker-id "github-actions-${{ github.run_id }}"
        env:
          COMMAND_ID: ${{ inputs.command_id }}
