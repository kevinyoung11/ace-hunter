name: execute durable ops command

on:
  workflow_dispatch:
    inputs:
      job_name:
        description: Registered job name
        required: true
        type: string
      command_id:
        description: Durable command queue id
        required: true
        type: string

permissions:
  contents: read

jobs:
  execute:
    runs-on: ubuntu-latest
    environment: ace-hunter-production
    timeout-minutes: 45
    env:
      ACE_HUNTER_RUNTIME_DATABASE_URL: ${{ secrets.ACE_HUNTER_RUNTIME_DATABASE_URL }}
      ACE_HUNTER_GITHUB_TOKEN: ${{ secrets.ACE_HUNTER_GITHUB_TOKEN }}
      ACE_HUNTER_USER_ID: ${{ secrets.ACE_HUNTER_USER_ID }}
      ACE_HUNTER_DEEPSEEK_API_KEY: ${{ secrets.ACE_HUNTER_DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: >-
          node dist/src/cli/index.js job '${{ inputs.job_name }}'
          --command-id '${{ inputs.command_id }}'
          --orchestrator-run-id '${{ github.run_id }}'
          --orchestrator-run-attempt '${{ github.run_attempt }}'
          --orchestrator-workflow 'ops-command.yml'
